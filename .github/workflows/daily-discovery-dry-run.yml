name: Daily Discovery Dry Run

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  discovery-dry-run:
    runs-on: ubuntu-latest
    env:
      UNDER_OVER_SEARCH_URL: https://www.property24.com/for-sale/gauteng/1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run discovery dry-run
        run: python scripts/run_ingestion.py --search-url "${UNDER_OVER_SEARCH_URL}" --limit 5
